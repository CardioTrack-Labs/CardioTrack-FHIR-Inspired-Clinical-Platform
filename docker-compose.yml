# CardioTrack — Local Development
#
# DB is Supabase (remote). This compose file runs the Go API locally only.
# Usage:
#   docker-compose up --build
#
# Requires backend/.env to be populated with Supabase DATABASE_URL + JWT secrets.

services:
  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      # Persist uploads across container restarts (local dev only)
      - ./backend/uploads:/app/uploads
    depends_on:
      - rabbitmq
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  python-service:
    build: ./python-service
    env_file:
      - ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - BACKEND_URL=http://api:8080
    volumes:
      # Share the uploads volume so both services can read/write raw signals
      - ./backend/uploads:/app/uploads
    depends_on:
      - rabbitmq
      - api
    restart: unless-stopped
