# Config file for [Air](https://github.com/air-verse/air) live-reload in TOML format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Build command compiling main.go to tmp/main
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  # Binary generated from the build command
  bin = "./tmp/main"
  # Customize binary runtime arguments if needed
  args_bin = []
  # Watch only these directories containing Go source files
  watch_dir = ["cmd", "internal"]
  # EXCLUDE these directories (especially uploads, tmp and docs)
  exclude_dir = ["uploads", "tmp", "docs", "migrations"]
  # Exclude non-Go extensions
  exclude_ext = ["_test.go", "pdf", "png", "jpg", "jpeg", "env", "md", "toml"]
  # Watch subdirectories recursively
  include_dir = []
  # Watch specific files
  include_ext = ["go"]
  # Exclude specific files
  exclude_file = []
  # Delay rebuild after changes to let file writes settle (in milliseconds)
  delay = 800
  # Stop running the old binary if the new build fails
  stop_on_error = true
  # Log error outputs to file
  log = "air_errors.log"

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  time = false

[misc]
  clean_on_exit = true
